<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lernkarten-Manager</title>
<meta name="description" content="Erstelle und durcharbeite Lernkarten.">
<meta name="theme-color" content="#1A1A1A">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F9F8F6;
  --card: #FFFFFF;
  --ink: #1A1A1A;
  --ink-soft: #333;
  --gray: #757575;
  --gray-soft: #B5AFA4;
  --hairline: rgba(26,26,26,0.08);
  --field: #F5F2EC;
  --accent: #C9A84C;
  --accent-deep: #A8862C;
  --green: #2D8A4E;
  --green-bg: #E8F5EC;
  --red: #C0392B;
  --red-bg: #FDECEB;
  --radius: 16px;
  --radius-sm: 12px;
  --shadow: 0 10px 30px -12px rgba(30,24,14,0.12);
  --shadow-lg: 0 24px 60px -20px rgba(30,24,14,0.18);
  --sans: "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--ink-soft);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100dvh;
}

/* Header */
.header {
  background: var(--card);
  border-bottom: 1px solid var(--hairline);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 {
  font-size: 20px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.3px;
}
.header-actions { display: flex; gap: 8px; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 18px;
  border: none;
  border-radius: 9999px;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn-primary {
  background: var(--ink);
  color: #fff;
}
.btn-primary:hover { background: #333; }
.btn-secondary {
  background: var(--field);
  color: var(--ink);
}
.btn-secondary:hover { background: #E8E3D9; }
.btn-accent {
  background: var(--accent);
  color: #fff;
}
.btn-accent:hover { background: var(--accent-deep); }
.btn-sm { padding: 7px 14px; font-size: 13px; }
.btn-icon {
  width: 36px; height: 36px;
  padding: 0;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: var(--field);
  cursor: pointer;
  font-size: 18px;
  transition: all 0.2s;
}
.btn-icon:hover { background: #E8E3D9; }

/* Tabs */
.tabs {
  display: flex;
  gap: 4px;
  padding: 12px 20px;
  background: var(--bg);
  overflow-x: auto;
}
.tab {
  padding: 8px 16px;
  border-radius: 9999px;
  border: 1px solid var(--hairline);
  background: var(--card);
  font-size: 13px;
  font-weight: 500;
  color: var(--gray);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.tab:hover { border-color: var(--gray-soft); }
.tab.active {
  background: var(--ink);
  color: #fff;
  border-color: var(--ink);
}

/* Container */
.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 0 16px 100px;
}

/* Card grid */
.card-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
  margin-top: 12px;
}

/* Flashcard item */
.card-item {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
  border: 1px solid var(--hairline);
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.card-item:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); }
.card-item.learned {
  border-left: 3px solid var(--green);
}
.card-category {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--accent-deep);
  margin-bottom: 6px;
}
.card-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 4px;
}
.card-preview {
  font-size: 14px;
  color: var(--gray);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.card-badge {
  position: absolute;
  top: 12px;
  right: 12px;
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 9999px;
  font-weight: 600;
}
.card-badge.learned {
  background: var(--green-bg);
  color: var(--green);
}

/* Study mode */
.study-view {
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}
.study-view.active { display: flex; }

.flip-card-container {
  perspective: 1000px;
  width: 100%;
  max-width: 400px;
  height: 280px;
  margin: 20px 0;
}
.flip-card {
  width: 100%;
  height: 100%;
  transition: transform 0.6s;
  transform-style: preserve-3d;
  position: relative;
}
.flip-card.flipped { transform: rotateY(180deg); }
.flip-front, .flip-back {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  text-align: center;
  box-shadow: var(--shadow-lg);
}
.flip-front {
  background: var(--card);
  border: 2px solid var(--accent);
}
.flip-back {
  background: var(--ink);
  color: #fff;
  transform: rotateY(180deg);
}
.flip-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
  color: var(--gray-soft);
}
.flip-back .flip-label { color: var(--gray-soft); }
.flip-text {
  font-size: 22px;
  font-weight: 700;
  line-height: 1.3;
  color: var(--ink);
}
.flip-back .flip-text { color: #fff; }
.flip-category {
  font-size: 12px;
  color: var(--accent);
  margin-top: 12px;
  font-weight: 500;
}

.study-controls {
  display: flex;
  gap: 12px;
  margin-top: 16px;
  align-items: center;
}
.study-progress {
  font-size: 13px;
  color: var(--gray);
  margin-top: 12px;
}

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--card);
  border-radius: var(--radius) var(--radius) 0 0;
  padding: 24px 20px 40px;
  width: 100%;
  max-width: 500px;
  max-height: 90dvh;
  overflow-y: auto;
}
.modal h2 {
  font-size: 20px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 20px;
}
.form-group {
  margin-bottom: 16px;
}
.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 6px;
}
.form-group input,
.form-group textarea {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--hairline);
  border-radius: var(--radius-sm);
  font-family: var(--sans);
  font-size: 15px;
  background: var(--field);
  color: var(--ink);
  outline: none;
  transition: border 0.2s;
}
.form-group input:focus,
.form-group textarea:focus {
  border-color: var(--accent);
}
.form-group textarea { resize: vertical; min-height: 80px; }
.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
  justify-content: flex-end;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--gray);
}
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state h3 { font-size: 18px; color: var(--ink); margin-bottom: 8px; }
.empty-state p { font-size: 14px; max-width: 280px; margin: 0 auto 20px; }

/* Stats bar */
.stats-bar {
  display: flex;
  gap: 16px;
  padding: 12px 20px;
  background: var(--card);
  border-bottom: 1px solid var(--hairline);
}
.stat {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.stat-num { font-size: 20px; font-weight: 700; color: var(--ink); }
.stat-label { font-size: 11px; color: var(--gray); font-weight: 500; }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--ink);
  color: #fff;
  padding: 12px 24px;
  border-radius: 9999px;
  font-size: 14px;
  font-weight: 500;
  z-index: 300;
  transition: transform 0.3s;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* Responsive */
@media (min-width: 480px) {
  .card-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>📚 Lernkarten</h1>
  <div class="header-actions">
    <button class="btn btn-sm btn-secondary" onclick="enterStudyMode()" id="studyBtn" style="display:none">▶ Lernen</button>
    <button class="btn btn-sm btn-primary" onclick="openModal()">+ Neue Karte</button>
  </div>
</div>

<!-- Stats -->
<div class="stats-bar" id="statsBar">
  <div class="stat"><span class="stat-num" id="statTotal">0</span><span class="stat-label">Gesamt</span></div>
  <div class="stat"><span class="stat-num" id="statLearned">0</span><span class="stat-label">Gelernt</span></div>
  <div class="stat"><span class="stat-num" id="statOpen">0</span><span class="stat-label">Offen</span></div>
</div>

<!-- Category tabs -->
<div class="tabs" id="categoryTabs">
  <button class="tab active" data-cat="all" onclick="filterCategory('all',this)">Alle</button>
</div>

<!-- List View -->
<div class="container" id="listView">
  <div class="card-grid" id="cardGrid"></div>
  <div class="empty-state" id="emptyState">
    <div class="icon">📝</div>
    <h3>Noch keine Karten</h3>
    <p>Erstelle deine erste Lernkarte und starte durch!</p>
    <button class="btn btn-primary" onclick="openModal()">+ Erste Karte erstellen</button>
  </div>
</div>

<!-- Study View -->
<div class="study-view" id="studyView">
  <div class="flip-card-container" onclick="flipCurrentCard()">
    <div class="flip-card" id="flipCard">
      <div class="flip-front">
        <div class="flip-label">Frage</div>
        <div class="flip-text" id="studyFront"></div>
        <div class="flip-category" id="studyCategory"></div>
      </div>
      <div class="flip-back">
        <div class="flip-label">Antwort</div>
        <div class="flip-text" id="studyBack"></div>
      </div>
    </div>
  </div>
  <div class="study-progress" id="studyProgress"></div>
  <div class="study-controls">
    <button class="btn btn-secondary btn-sm" onclick="markCurrent(false)">✗ Nochmal</button>
    <button class="btn btn-accent btn-sm" onclick="markCurrent(true)">✓ Gelernt</button>
    <button class="btn btn-sm btn-secondary" onclick="exitStudyMode()">✕ Ende</button>
  </div>
</div>

<!-- Create/Edit Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2 id="modalTitle">Neue Lernkarte</h2>
    <div class="form-group">
      <label>Kategorie</label>
      <input type="text" id="inputCategory" placeholder="z.B. Biologie, Mathe, Geschichte...">
    </div>
    <div class="form-group">
      <label>Titel / Frage (Vorderseite)</label>
      <input type="text" id="inputTitle" placeholder="Was möchtest du lernen?">
    </div>
    <div class="form-group">
      <label>Inhalt / Antwort (Rückseite)</label>
      <textarea id="inputContent" placeholder="Die Antwort oder Erklärung..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveCard()">Speichern</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ---- Data Layer ----
const STORAGE_KEY = 'lernkarten_data';
let cards = [];
let currentFilter = 'all';
let editingId = null;

// Study mode
let studyCards = [];
let studyIndex = 0;

function loadData() {
  try {
    cards = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch { cards = []; }
}
function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
}

// ---- Rendering ----
function render() {
  renderStats();
  renderTabs();
  renderGrid();
}

function renderStats() {
  const total = cards.length;
  const learned = cards.filter(c => c.learned).length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statLearned').textContent = learned;
  document.getElementById('statOpen').textContent = total - learned;
  document.getElementById('studyBtn').style.display = total > 0 ? '' : 'none';
}

function renderTabs() {
  const cats = [...new Set(cards.map(c => c.category))].sort();
  const container = document.getElementById('categoryTabs');
  const existing = currentFilter;
  container.innerHTML = '<button class="tab' + (currentFilter === 'all' ? ' active' : '') + '" data-cat="all" onclick="filterCategory(\'all\',this)">Alle</button>';
  cats.forEach(cat => {
    const count = cards.filter(c => c.category === cat).length;
    container.innerHTML += `<button class="tab${currentFilter === cat ? ' active' : ''}" data-cat="${esc(cat)}" onclick="filterCategory('${esc(cat)}',this)">${esc(cat)} (${count})</button>`;
  });
}

function renderGrid() {
  const filtered = currentFilter === 'all' ? cards : cards.filter(c => c.category === currentFilter);
  const grid = document.getElementById('cardGrid');
  const empty = document.getElementById('emptyState');

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = filtered.map(card => `
    <div class="card-item${card.learned ? ' learned' : ''}" onclick="viewCard('${card.id}')">
      <div class="card-category">${esc(card.category)}</div>
      <div class="card-title">${esc(card.title)}</div>
      <div class="card-preview">${esc(card.content)}</div>
      ${card.learned ? '<span class="card-badge learned">✓ Gelernt</span>' : ''}
    </div>
  `).join('');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML.replace(/'/g, '&#39;');
}

// ---- Filter ----
function filterCategory(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderGrid();
}

// ---- Modal ----
function openModal(id) {
  editingId = id || null;
  const modal = document.getElementById('modalOverlay');
  if (id) {
    const card = cards.find(c => c.id === id);
    if (!card) return;
    document.getElementById('modalTitle').textContent = 'Karte bearbeiten';
    document.getElementById('inputCategory').value = card.category;
    document.getElementById('inputTitle').value = card.title;
    document.getElementById('inputContent').value = card.content;
  } else {
    document.getElementById('modalTitle').textContent = 'Neue Lernkarte';
    document.getElementById('inputCategory').value = '';
    document.getElementById('inputTitle').value = '';
    document.getElementById('inputContent').value = '';
  }
  modal.classList.add('active');
  setTimeout(() => document.getElementById('inputCategory').focus(), 100);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  editingId = null;
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function saveCard() {
  const category = document.getElementById('inputCategory').value.trim();
  const title = document.getElementById('inputTitle').value.trim();
  const content = document.getElementById('inputContent').value.trim();
  if (!title || !content) {
    showToast('Bitte Titel und Inhalt ausfüllen');
    return;
  }

  if (editingId) {
    const card = cards.find(c => c.id === editingId);
    if (card) {
      card.category = category || 'Allgemein';
      card.title = title;
      card.content = content;
    }
    showToast('Karte aktualisiert ✓');
  } else {
    cards.push({
      id: 'c' + Date.now() + Math.random().toString(36).slice(2,6),
      category: category || 'Allgemein',
      title,
      content,
      learned: false,
      createdAt: Date.now()
    });
    showToast('Karte erstellt ✓');
  }

  saveData();
  closeModal();
  render();
}

// ---- View / Delete ----
function viewCard(id) {
  const card = cards.find(c => c.id === id);
  if (!card) return;
  if (confirm(`"${card.title}" — Bearbeiten (OK) oder Löschen (Abbrechen)?`)) {
    openModal(id);
  } else {
    if (confirm('Wirklich löschen?')) {
      cards = cards.filter(c => c.id !== id);
      saveData();
      render();
      showToast('Karte gelöscht');
    }
  }
}

// ---- Study Mode ----
function enterStudyMode() {
  studyCards = cards.filter(c => !c.learned);
  if (studyCards.length === 0) {
    studyCards = [...cards]; // if all learned, redo all
  }
  if (studyCards.length === 0) return;
  // shuffle
  for (let i = studyCards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [studyCards[i], studyCards[j]] = [studyCards[j], studyCards[i]];
  }
  studyIndex = 0;
  showStudyCard();
  document.getElementById('listView').style.display = 'none';
  document.getElementById('categoryTabs').style.display = 'none';
  document.getElementById('studyView').classList.add('active');
}

function showStudyCard() {
  const card = studyCards[studyIndex];
  document.getElementById('studyFront').textContent = card.title;
  document.getElementById('studyBack').textContent = card.content;
  document.getElementById('studyCategory').textContent = card.category;
  document.getElementById('studyProgress').textContent = `${studyIndex + 1} von ${studyCards.length}`;
  document.getElementById('flipCard').classList.remove('flipped');
}

function flipCurrentCard() {
  document.getElementById('flipCard').classList.toggle('flipped');
}

function markCurrent(learned) {
  const card = studyCards[studyIndex];
  const original = cards.find(c => c.id === card.id);
  if (original && learned) {
    original.learned = true;
    saveData();
  }
  studyIndex++;
  if (studyIndex >= studyCards.length) {
    exitStudyMode();
    showToast(learned ? 'Alle Karten durchgearbeitet! 🎉' : 'Runde beendet');
    render();
    return;
  }
  showStudyCard();
}

function exitStudyMode() {
  document.getElementById('studyView').classList.remove('active');
  document.getElementById('listView').style.display = '';
  document.getElementById('categoryTabs').style.display = '';
  render();
}

// ---- Toast ----
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ---- Init ----
loadData();
render();

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
